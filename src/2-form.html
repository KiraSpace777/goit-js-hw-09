<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <main>
      <div class="container">
        <nav class="nav">
          <a class="nav-logo" href="./index.html" aria-label="Site logo">
            <svg class="nav-logo-icon" width="100" height="30">
              <use href="img/sprite.svg#logo"></use>
            </svg>
          </a>
          <a class="back-link" href="./index.html">return to main</a>
        </nav>
        <h1 class="main-title">Feedback form</h1>
        <form class="feedback-form" autocomplete="off">
          <label class="feedback-email">
            Email
            <input
              type="email"
              name="email"
              class="feedback-email-input"
              autofocus
            />
          </label>
          <label class="feedback-message">
            Message
            <textarea
              name="message"
              rows="8"
              class="feedback-textarea"
            ></textarea>
          </label>
          <button type="submit" class="feedback-btn">Submit</button>
        </form>
      </div>
    </main>

    <script type="module" src="./js/2-form.js"></script>
  </body>
</html>
